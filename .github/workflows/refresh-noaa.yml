name: Refresh NOAA snapshot and deploy Pages

on:
  push:
    branches:
      - main
  schedule:
    - cron: "25 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-noaa-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download latest NOAA observations
        if: github.event_name != 'push'
        run: |
          set -euo pipefail
          mkdir -p data
          curl --fail --silent --show-error --location \
            --retry 3 \
            --retry-delay 5 \
            --output data/latest_obs.txt.tmp \
            https://www.ndbc.noaa.gov/data/latest_obs/latest_obs.txt

          test -s data/latest_obs.txt.tmp
          mv data/latest_obs.txt.tmp data/latest_obs.txt

      - name: Commit snapshot if it changed
        id: snapshot
        if: github.event_name != 'push'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_obs.txt

          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Refresh NOAA snapshot"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Configure Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || steps.snapshot.outputs.changed == 'true'
        uses: actions/configure-pages@v5

      - name: Stage site for Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || steps.snapshot.outputs.changed == 'true'
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '_site' \
            ./ _site/

      - name: Upload Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || steps.snapshot.outputs.changed == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || steps.snapshot.outputs.changed == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
