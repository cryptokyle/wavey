name: Refresh NOAA snapshot

on:
  schedule:
    - cron: "25 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-noaa-snapshot
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download latest NOAA observations
        run: |
          set -euo pipefail
          mkdir -p data
          curl --fail --silent --show-error --location \
            --retry 3 \
            --retry-delay 5 \
            --output data/latest_obs.txt.tmp \
            https://www.ndbc.noaa.gov/data/latest_obs/latest_obs.txt

          test -s data/latest_obs.txt.tmp
          mv data/latest_obs.txt.tmp data/latest_obs.txt

      - name: Commit snapshot if it changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest_obs.txt

          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git commit -m "Refresh NOAA snapshot"
          git push
