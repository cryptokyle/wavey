<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Beach Cams</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; font-family:Arial; background:#0b0f14; color:white; }
h1 { text-align:center; padding:16px; }

details {
  margin:8px;
  border:1px solid #333;
  border-radius:10px;
  padding:8px;
  background:#121821;
}

summary { cursor:pointer; font-weight:bold; }

.video-wrap { position:relative; }

video, iframe {
  width:100%;
  height:600px;
  border-radius:10px;
  border:none;
  cursor:pointer;
}

/* OFFLINE */
.offline {
  position:absolute;
  top:10px;
  left:10px;
  background:red;
  padding:6px 10px;
  border-radius:6px;
  display:none;
}

#modal {
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}

#modal video, #modal iframe {
  width:95%;
  height:95%;
}
</style>
</head>

<body>

<h1>🌊 Beach Cam Dashboard</h1>

<div id="modal" onclick="closeModal()"></div>

<!-- FLORIDA -->
<details class="state">
<summary>Florida</summary>

<details class="city">
<summary>Okaloosa Island</summary>

<!-- ✅ YOUTUBE BREAK -->
<details class="break youtube" data-yt="QnvxSpZ9HPI">
<summary>Wyndham</summary>
<div class="video-wrap">
  <div class="player"></div>
</div>
</details>

</details>

</details>

<script>
const PROXY = "https://YOUR-PROXY.onrender.com/hls?url=";

const streams = {
  vid1: "https://video.hazcams.com/orange-beach-al-us-001/main_stream.m3u8"
};

let activeBreak = null;

/* ================= YOUTUBE LOADER ================= */

function loadYouTube(container, videoId) {
  if (container.dataset.loaded) return;

  const iframe = document.createElement("iframe");

  iframe.src =
    "https://www.youtube.com/embed/" + videoId +
    "?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&playsinline=1";

  iframe.allow = "autoplay; encrypted-media";
  iframe.allowFullscreen = true;

  container.appendChild(iframe);
  container.dataset.loaded = true;
}

function unloadYouTube(container) {
  container.innerHTML = "";
  container.dataset.loaded = "";
}

/* ================= HLS STREAM ================= */

function playStream(video, url, wrapper, useProxy=false) {
  const final = useProxy ? PROXY + encodeURIComponent(url) : url;
  const offline = wrapper.querySelector(".offline");

  const hls = new Hls();
  hls.loadSource(final);
  hls.attachMedia(video);

  hls.on(Hls.Events.ERROR, () => {
    if (!useProxy) {
      playStream(video, url, wrapper, true);
    } else {
      offline.style.display = "block";
    }
  });

  video.dataset.loaded = true;
}

function load(video, url) {
  const wrapper = video.closest(".video-wrap");
  if (!video.dataset.loaded) {
    playStream(video, url, wrapper);
  }
}

function unload(video) {
  video.pause();
  video.removeAttribute("src");
  video.load();
  video.dataset.loaded = "";
}

/* ================= BREAK LOGIC ================= */

document.querySelectorAll(".break").forEach(detail => {

  detail.addEventListener("toggle", () => {

    const video = detail.querySelector("video");
    const ytContainer = detail.querySelector(".player");
    const ytId = detail.dataset.yt;

    if (detail.open) {

      if (activeBreak && activeBreak !== detail) {
        activeBreak.open = false;
      }
      activeBreak = detail;

      // ✅ HLS
      if (video) {
        load(video, streams[video.id]);
      }

      // ✅ YOUTUBE AUTOPLAY
      if (ytContainer && ytId) {
        loadYouTube(ytContainer, ytId);
      }

    } else {

      if (video) unload(video);

      if (ytContainer) unloadYouTube(ytContainer);
    }
  });

});

/* ================= CITY AUTOCOLLAPSE ================= */

document.querySelectorAll(".state").forEach(state => {
  const cities = state.querySelectorAll(".city");

  cities.forEach(city => {
    city.addEventListener("toggle", () => {
      if (city.open) {
        cities.forEach(c => {
          if (c !== city) c.open = false;
        });
      }
    });
  });
});

/* ================= MODAL ================= */

const modal = document.getElementById("modal");

document.addEventListener("click", e => {
  if (e.target.tagName === "VIDEO" || e.target.tagName === "IFRAME") {
    modal.innerHTML = "";
    modal.style.display = "flex";
    modal.appendChild(e.target.cloneNode(true));
  }
});

function closeModal() {
  modal.style.display = "none";
  modal.innerHTML = "";
}
</script>

</body>
</html>
