<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Live Beach Cams</title>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
      color: white;
    }

    h1 {
      text-align: center;
      padding: 16px;
    }

    details {
      margin: 10px;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px;
      background: #121821;
    }

    summary {
      font-size: 1.4em;
      cursor: pointer;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .card {
      background: #1a222d;
      border-radius: 12px;
      padding: 8px;
    }

    video, iframe {
      width: 100%;
      height: 250px;
      border-radius: 8px;
      border: none;
    }

    h3 {
      margin: 6px 0;
      font-size: 1em;
    }
  </style>
</head>

<body>

<h1>🌊 Live Beach Cameras</h1>

<!-- ================= ALABAMA ================= -->
<details>
  <summary>Alabama</summary>
  <div class="grid">

    <div class="card">
      <h3>Dauphin Island</h3>
      <video id="vid1" controls autoplay muted></video>
    </div>

    <div class="card">
      <h3>Gulf Shores</h3>
      <video id="vid2" controls autoplay muted></video>
    </div>

    <div class="card">
      <h3>Beach Club (YouTube)</h3>
      <iframe src="https://www.youtube.com/embed/l2em7gqBj00"></iframe>
    </div>

    <div class="card">
      <h3>Enclave (YouTube)</h3>
      <iframe src="https://www.youtube.com/embed/g4fuUj6X7GY"></iframe>
    </div>

    <div class="card">
      <h3>Orange Beach (Hazcams)</h3>
      <video id="vid3" controls autoplay muted></video>
    </div>

    <div class="card">
      <h3>Holiday Inn Stream</h3>
      <video id="vid4" controls autoplay muted></video>
    </div>

    <div class="card">
      <h3>Jetty Cam (YouTube)</h3>
      <iframe src="https://www.youtube.com/embed/5Ijk8QsR-nw"></iframe>
    </div>

    <div class="card">
      <h3>Turquoise Place (YouTube)</h3>
      <iframe src="https://www.youtube.com/embed/pJqrjIuvGFE"></iframe>
    </div>

  </div>
</details>


<!-- ================= FLORIDA ================= -->
<details>
  <summary>Florida</summary>
  <div class="grid">

    <div class="card">
      <h3>Inlet Beach</h3>
      <video id="vid5" controls autoplay muted></video>
    </div>

    <div class="card">
      <h3>Okaloosa Island (YouTube)</h3>
      <iframe src="https://www.youtube.com/embed/QnvxSpZ9HPI"></iframe>
    </div>

    <div class="card">
      <h3>Panama City Beach</h3>
      <video id="vid6" controls autoplay muted></video>
    </div>

    <div class="card">
      <h3>St. George Island</h3>
      <video id="vid7" controls autoplay muted></video>
    </div>

  </div>
</details>


<script>
function loadHLS(videoId, url) {
  const video = document.getElementById(videoId);

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
  }
}

// Alabama streams
loadHLS("vid1", "https://video.hazcams.com/dauphin-island-al-us-002/main_stream.m3u8");
loadHLS("vid2", "https://video.hazcams.com/gulf-shores-al-us-001/main_stream.m3u8");
loadHLS("vid3", "https://video.hazcams.com/orange-beach-al-us-001/main_stream.m3u8");
loadHLS("vid4", "https://orangebeach.b-cdn.net/Alabama/orange-beach-holiday-inn.stream/chunklist.m3u8");

// Florida streams
loadHLS("vid5", "https://video.hazcams.com/inlet-beach-fl-us-001/main_stream.m3u8");
loadHLS("vid6", "https://video.hazcams.com/panama-city-beachin_stream.m3u8");
loadHLS("vid7", "https://stgeorgelighthouse.cdn.coastalcameranetwork.com/Florida/stgeorgelighthouse.stream/chunklist.m3u8");

</script>

</body>
</html>
