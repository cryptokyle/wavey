  font-size:12px;
}

.loading { background:orange; }

.latency {

  right:10px;
  background:black;
  padding:5px 10px;
  border-radius:6px;
}

/* MODAL */

  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
}

#modal video, #modal iframe {
  width:95%;
  height:95%;
}

<script>
const PROXY = "https://YOUR-PROXY.onrender.com/hls?url=";
let activeBreak = null;

/* STATUS */
function setStatus(w,s){
  const el=w.querySelector(".status");
  el.className="status "+s;
  el.textContent=s.toUpperCase();
}
function setLatency(w,t){
  w.querySelector(".latency").textContent=t+" ms";
}

/* HLS */
function playHLS(video,url,w){
  let start=performance.now();
  setStatus(w,"loading");

  function load(useProxy=false){
    const hls=new Hls();
    hls.loadSource(useProxy ? PROXY+encodeURIComponent(url):url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED,()=>{
      setStatus(w,"live");
      setLatency(w,Math.round(performance.now()-start));
    });

    hls.on(Hls.Events.ERROR,()=>{
      if(!useProxy) load(true);
      else setStatus(w,"offline");
    });
  }

  load();
}

/* YOUTUBE */
function playYT(container,id,w){
  let start=performance.now();
  setStatus(w,"loading");

  const iframe=document.createElement("iframe");
  iframe.src =
    `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0`;

  iframe.onload=()=>{
    setStatus(w,"live");
    setLatency(w,Math.round(performance.now()-start));
  };

  container.appendChild(iframe);
}

/* CLEAR */
function clear(detail){
  const v=detail.querySelector("video");
  const p=detail.querySelector(".player");

  if(v){
    v.pause();
    v.src="";
    v.load();
  }
  if(p) p.innerHTML="";
}

/* BREAK LOGIC */
document.querySelectorAll(".break").forEach(d=>{
  d.addEventListener("toggle",()=>{
    const wrap=d.querySelector(".video-wrap");

    if(d.open){
      if(activeBreak && activeBreak!==d){
        activeBreak.open=false;
      }
      activeBreak=d;

      if(d.dataset.type==="hls"){
        playHLS(d.querySelector("video"),d.dataset.src,wrap);
      } else {
        playYT(d.querySelector(".player"),d.dataset.src,wrap);
      }

    } else {
      clear(d);
    }
  });
});

/* CITY AUTOCOLLAPSE */
document.querySelectorAll(".state").forEach(state=>{
  const cities=state.querySelectorAll(".city");

  cities.forEach(c=>{
    c.addEventListener("toggle",()=>{
      if(c.open){
        cities.forEach(x=>{
          if(x!==c) x.open=false;
        });
      }
    });
  });
});

/* MODAL */
const modal=document.getElementById("modal");

document.addEventListener("click",e=>{
  if(e.target.tagName==="VIDEO" || e.target.tagName==="IFRAME"){
    modal.innerHTML="";
    modal.style.display="flex";
    modal.appendChild(e.target.cloneNode(true));
  }
});

function closeModal(){
  modal.style.display="none";
  modal.innerHTML="";
}
</script>
