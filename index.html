<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Live Beach Cams</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f14;
  color: white;
}

h1 {
  text-align: center;
  padding: 16px;
}

details {
  margin: 8px;
  border: 1px solid #333;
  border-radius: 10px;
  padding: 8px;
  background: #121821;
}

summary {
  cursor: pointer;
  font-weight: bold;
  font-size: 1.2em;
}

video, iframe {
  width: 100%;
  height: 300px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

/* FULLSCREEN MODAL */
#modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#modal video, #modal iframe {
  width: 95%;
  height: 95%;
}
</style>
</head>

<body>

<h1>🌊 Live Beach Cameras</h1>

<!-- MODAL -->
<div id="modal" onclick="closeModal()"></div>

<!-- ================= ALABAMA ================= -->
<details>
<summary>Alabama</summary>

<details>
<summary>Orange Beach</summary>

<details>
<summary>Main Beach</summary>
<video id="vid1" controls muted></video>
</details>

<details>
<summary>Holiday Inn</summary>
<video id="vid2" controls muted></video>
</details>

<details>
<summary>Jetty Cam</summary>
<iframe src="https://www.youtube.com/embed/5Ijk8QsR-nw"></iframe>
</details>

<details>
<summary>Turquoise Place</summary>
<iframe src="https://www.youtube.com/embed/pJqrjIuvGFE"></iframe>
</details>

</details>

<details>
<summary>Gulf Shores</summary>

<details>
<summary>Main Beach</summary>
<video id="vid3" controls muted></video>
</details>

<details>
<summary>Beach Club</summary>
<iframe src="https://www.youtube.com/embed/l2em7gqBj00"></iframe>
</details>

<details>
<summary>Enclave</summary>
<iframe src="https://www.youtube.com/embed/g4fuUj6X7GY"></iframe>
</details>

</details>

<details>
<summary>Dauphin Island</summary>

<details>
<summary>Main Cam</summary>
<video id="vid4" controls muted></video>
</details>

</details>

</details>

<!-- ================= FLORIDA ================= -->
<details>
<summary>Florida</summary>

<details>
<summary>Inlet Beach</summary>

<details>
<summary>Main Cam</summary>
<video id="vid5" controls muted></video>
</details>

</details>

<details>
<summary>Okaloosa Island</summary>

<details>
<summary>Wyndham Garden</summary>
<iframe src="https://www.youtube.com/embed/QnvxSpZ9HPI"></iframe>
</details>

</details>

<details>
<summary>Panama City Beach</summary>

<details>
<summary>Main Cam</summary>
<video id="vid6" controls muted></video>
</details>

</details>

<details>
<summary>St. George Island</summary>

<details>
<summary>Lighthouse</summary>
<video id="vid7" controls muted></video>
</details>

</details>

</details>

<script>
const streams = {
  vid1: "https://video.hazcams.com/orange-beach-al-us-001/main_stream.m3u8",
  vid2: "https://orangebeach.b-cdn.net/Alabama/orange-beach-holiday-inn.stream/chunklist.m3u8",
  vid3: "https://video.hazcams.com/gulf-shores-al-us-001/main_stream.m3u8",
  vid4: "https://video.hazcams.com/dauphin-island-al-us-002/main_stream.m3u8",
  vid5: "https://video.hazcams.com/inlet-beach-fl-us-001/main_stream.m3u8",
  vid6: "https://video.hazcams.com/panama-city-beach-fl-us-001/main_stream.m3u8",
  vid7: "https://stgeorgelighthouse.cdn.coastalcameranetwork.com/Florida/stgeorgelighthouse.stream/chunklist.m3u8"
};

let activeDetail = null;

function loadStream(video, url) {
  if (video.dataset.loaded) return;

  let retries = 0;

  function init() {
    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(url);
      hls.attachMedia(video);

      hls.on(Hls.Events.ERROR, function () {
        if (retries < 5) {
          retries++;
          setTimeout(init, 3000);
        }
      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = url;
    }
  }

  init();
  video.dataset.loaded = "true";
}

function unloadStream(video) {
  video.pause();
  video.removeAttribute("src");
  video.load();
  video.dataset.loaded = "";
}

// ONLY ONE OPEN STREAM AT A TIME + LOAD/UNLOAD
document.querySelectorAll("details").forEach(detail => {
  detail.addEventListener("toggle", () => {

    const video = detail.querySelector("video");

    if (detail.open) {

      // close previous open break
      if (activeDetail && activeDetail !== detail) {
        activeDetail.open = false;
      }
      activeDetail = detail;

      if (video) {
        const url = streams[video.id];
        if (url) loadStream(video, url);
      }

    } else {
      if (video && video.dataset.loaded) {
        unloadStream(video);
      }
    }
  });
});

// FULLSCREEN MODAL
const modal = document.getElementById("modal");

document.addEventListener("click", e => {
  if (e.target.tagName === "VIDEO" || e.target.tagName === "IFRAME") {
    e.stopPropagation();

    modal.innerHTML = "";
    modal.style.display = "flex";

    const clone = e.target.cloneNode(true);

    if (clone.tagName === "IFRAME") {
      clone.src = clone.src + "?autoplay=1";
    } else {
      clone.controls = true;
      clone.autoplay = true;
    }

    modal.appendChild(clone);
  }
});

function closeModal() {
  modal.style.display = "none";
  modal.innerHTML = "";
}
</script>

</body>
</html>
