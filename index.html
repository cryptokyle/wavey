<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Beach Cam Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body { margin:0; font-family:Arial; background:#0b0f14; color:white; }
h1 { text-align:center; padding:16px; }

details {
  margin:8px;
  border:1px solid #333;
  border-radius:10px;
  padding:8px;
  background:#121821;
}

summary { cursor:pointer; font-weight:bold; }

.video-wrap { position:relative; }

video, iframe {
  width:100%;
  height:600px;
  border-radius:10px;
}

/* STATUS BADGES */
.status {
  position:absolute;
  top:10px;
  left:10px;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
}

.live { background:green; }
.loading { background:orange; }
.offline { background:red; }

.latency {
  position:absolute;
  top:10px;
  right:10px;
  background:black;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
}

/* SCAN BUTTON */
#controls {
  text-align:center;
  margin-bottom:10px;
}

button {
  padding:8px 15px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

/* MODAL */
#modal {
  position:fixed;
  inset:0;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
}

#modal video, #modal iframe {
  width:95%;
  height:95%;
}
</style>
</head>

<body>

<h1>🌊 Beach Cam Dashboard</h1>

<div id="controls">
  <button onclick="startScan()">▶ Start Scan</button>
  <button onclick="stopScan()">⏹ Stop</button>
</div>

<div id="modal" onclick="closeModal()"></div>

<!-- STATE -->
<details class="state">
<summary>Florida</summary>

<details class="city">
<summary>Inlet Beach</summary>

<details class="break" data-type="hls" data-src="https://video.hazcams.com/inlet-beach-fl-us-001/main_stream.m3tus loading">LOADING</div>
  <div class="latency"></div>
  <video muted controls></video>
</div>
</details>

</details>

<details class="city">
<summary>Okaloosa Island</summary>

<details class="break" data-type="yt" data-src="Qnvxideo-wrap">
  <div class="status loading">LOADING</div>
  <div class="latency"></div>
  <div class="player"></div>
</div>
</details>

</details>

</details>

<script>
const PROXY = "https://YOUR-PROXY.onrender.com/hls?url=";

let activeBreak = null;
let scanInterval = null;

/* ================= STREAM HANDLER ================= */

function setStatus(wrapper, state) {
  const s = wrapper.querySelector(".status");
  s.className = "status " + state;
  s.textContent = state.toUpperCase();
}

function setLatency(wrapper, time) {
  const l = wrapper.querySelector(".latency");
  l.textContent = time + " ms";
}

function playHLS(video, url, wrapper) {
  let start = performance.now();
  setStatus(wrapper, "loading");

  function init(useProxy=false) {
    const final = useProxy ? PROXY + encodeURIComponent(url) : url;

    const hls = new Hls();
    hls.loadSource(final);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      const latency = Math.round(performance.now() - start);
      setStatus(wrapper, "live");
      setLatency(wrapper, latency);
    });

    hls.on(Hls.Events.ERROR, () => {
      if (!useProxy) {
        init(true);
      } else {
        setStatus(wrapper, "offline");
      }
    });
  }

  init();
}

function playYT(container, id, wrapper) {
  setStatus(wrapper, "loading");

  const start = performance.now();

  const iframe = document.createElement("iframe");
  iframe.src =
    "https://www.youtube.com/embed/" + id +
    "?autoplay=1&mute=1&controls=0&modestbranding=1&rel=0";

  iframe.onload = () => {
    const latency = Math.round(performance.now() - start);
    setStatus(wrapper, "live");
    setLatency(wrapper, latency);
  };

  container.appendChild(iframe);
}

function clearStream(detail) {
  const vid = detail.querySelector("video");
  const player = detail.querySelector(".player");

  if (vid) {
    vid.pause();
    vid.removeAttribute("src");
    vid.load();
  }
  if (player) player.innerHTML = "";
}

/* ================= BREAK LOGIC ================= */

document.querySelectorAll(".break").forEach(detail => {
  detail.addEventListener("toggle", () => {

    const wrapper = detail.querySelector(".video-wrap");

    if (detail.open) {
      if (activeBreak && activeBreak !== detail) {
        activeBreak.open = false;
      }
      activeBreak = detail;

      const type = detail.dataset.type;
      const src = detail.dataset.src;

      if (type === "hls") {
        playHLS(detail.querySelector("video"), src, wrapper);
      } else {
        playYT(detail.querySelector(".player"), src, wrapper);
      }

    } else {
      clearStream(detail);
    }
  });
});

/* ================= CITY COLLAPSE ================= */

document.querySelectorAll(".state").forEach(state => {
  const cities = state.querySelectorAll(".city");

  cities.forEach(city => {
    city.addEventListener("toggle", () => {
      if (city.open) {
        cities.forEach(c => {
          if (c !== city) c.open = false;
        });
      }
    });
  });
});

/* ================= SCAN MODE ================= */

const breaks = Array.from(document.querySelectorAll(".break"));
let scanIndex = 0;

function openBreak(i) {
  const b = breaks[i];

  // open parents
  let parent = b.parentElement;
  while (parent) {
    if (parent.tagName === "DETAILS") parent.open = true;
    parent = parent.parentElement;
  }

  b.open = true;
}

function startScan() {
  stopScan();
  scanInterval = setInterval(() => {
    openBreak(scanIndex);
    scanIndex = (scanIndex + 1) % breaks.length;
  }, 8000); // change speed here
}

function stopScan() {
  clearInterval(scanInterval);
}

/* ================= MODAL ================= */

const modal = document.getElementById("modal");

document.addEventListener("click", e => {
  if (e.target.tagName === "VIDEO" || e.target.tagName === "IFRAME") {
    modal.innerHTML = "";
    modal.style.display = "flex";
    modal.appendChild(e.target.cloneNode(true));
  }
});

function closeModal() {
  modal.style.display = "none";
  modal.innerHTML = "";
}
</script>

</body>
</html>
