<style>
body { margin:0; font-family:Arial; background:#0b0f14; color:white; }
h1 { text-align:center; padding:16px; }

details {
  margin:8px;
  border:1px solid #333;
  border-radius:10px;
  padding:8px;
  background:#121821;
}

summary { cursor:pointer; font-weight:bold; }

.video-wrap { position:relative; }

video, iframe {
  width:100%;
  height:600px;
  border-radius:10px;
  border:none;
}

/* STATUS */
.status {
  position:absolute;
  top:10px;
  left:10px;
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
}
.live { background:green; }
.loading { background:orange; }
.offline { background:red; }

.latency {
  position:absolute;
  top:10px;
  right:10px;
  background:black;
  padding:5px 10px;
  border-radius:6px;
}

/* MODAL */
#modal {
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

#modal video, #modal iframe {
  width:95%;
  height:95%;
}
</style>
</head>

<script>
const PROXY = "https://YOUR-PROXY.onrender.com/hls?url=";
let activeBreak = null;

/* STATUS */
function setStatus(w,s){
  const el=w.querySelector(".status");
  el.className="status "+s;
  el.textContent=s.toUpperCase();
}

function setLatency(w,t){
  w.querySelector(".latency").textContent=t+" ms";
}

/* HLS */
function playHLS(video,url,w){
  let start=performance.now();

  function load(useProxy=false){
    const hls=new Hls();
    hls.loadSource(useProxy?PROXY+encodeURIComponent(url):url);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED,()=>{
      setStatus(w,"live");
      setLatency(w,Math.round(performance.now()-start));
    });

    hls.on(Hls.Events.ERROR,()=>{
      if(!useProxy) load(true);
      else setStatus(w,"offline");
    });
  }

  setStatus(w,"loading");
  load();
}

/* ✅ FIXED YOUTUBE */
function playYT(container,id,w){
  let start=performance.now();
  setStatus(w,"loading");

  const iframe=document.createElement("iframe");

  iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&rel=0&modestbranding=1&playsinline=1`;

  iframe.allow = "autoplay; encrypted-media";
  iframe.allowFullscreen = true;

  iframe.onload = () => {
    setStatus(w,"live");
    setLatency(w,Math.round(performance.now()-start));
  };

  container.innerHTML = "";
  container.appendChild(iframe);
}

function clear(detail){
  const v=detail.querySelector("video");
  const p=detail.querySelector(".player");

  if(v){
    v.pause();
    v.src="";
    v.load();
  }
  if(p) p.innerHTML="";
}

/* BREAK */
document.querySelectorAll(".break").forEach(d=>{
  d.addEventListener("toggle",()=>{
    const wrap=d.querySelector(".video-wrap");

    if(d.open){
      if(activeBreak && activeBreak!==d){
        activeBreak.open=false;
      }
      activeBreak=d;

      if(d.dataset.type==="hls"){
        playHLS(d.querySelector("video"),d.dataset.src,wrap);
      } else {
        playYT(d.querySelector(".player"),d.dataset.src,wrap);
      }

    } else clear(d);
  });
});

/* CITY AUTO COLLAPSE */
document.querySelectorAll(".state").forEach(state=>{
  const cities=state.querySelectorAll(".city");

  cities.forEach(c=>{
    c.addEventListener("toggle",()=>{
      if(c.open){
        cities.forEach(x=>{
          if(x!==c) x.open=false;
        });
      }
    });
  });
});

/* MODAL */
const modal=document.getElementById("modal");
document.addEventListener("click",e=>{
  if(e.target.tagName==="VIDEO" || e.target.tagName==="IFRAME"){
    modal.innerHTML="";
    modal.style.display="flex";
    modal.appendChild(e.target.cloneNode(true));
  }
});
function closeModal(){
  modal.style.display="none";
  modal.innerHTML="";
}
</script>
